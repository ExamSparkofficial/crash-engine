services:
  postgres:
    image: postgres:16-alpine
    container_name: crashpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crashpulse
      POSTGRES_PASSWORD: crashpulse
      POSTGRES_DB: crashpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crashpulse -d crashpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics:
    build:
      context: ./analytics-service
    container_name: crashpulse-analytics
    restart: unless-stopped
    ports:
      - "8000:8000"

  app:
    build:
      context: .
    container_name: crashpulse-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      analytics:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://crashpulse:crashpulse@postgres:5432/crashpulse?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-development-secret-change-me
      ANALYTICS_SERVICE_URL: http://analytics:8000
      SOCKET_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  postgres-data:
